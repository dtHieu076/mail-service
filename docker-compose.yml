services:
  # ========================
  # DATABASE
  # ========================
  my-postgres:
    image: postgres:16-alpine
    container_name: my-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: postgres
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ========================
  # MAILHOG
  # ========================
  # mailhog:
  #   image: mailhog/mailhog:v1.0.1
  #   container_name: mailhog
  #   ports:
  #     - "1025:1025"
  #     - "8025:8025"

  # ========================
  # MAILPIT (THAY THẾ MAILHOG)
  # ========================
  mailpit:
    image: axllent/mailpit
    container_name: mailpit
    ports:
      - "1025:1025" # Cổng nhận mail SMTP
      - "8025:8025" # Cổng Web UI
  # ========================
  # REDPANDA (THAY KAFKA)
  # ========================
  kafka-local:
    image: redpandadata/redpanda:latest
    container_name: kafka-local
    volumes:
      - kafka_data:/var/lib/redpanda/data
    ports:
      - "9092:9092"
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka-local:9092

  # ========================
  # QUARKUS BACKEND
  # ========================
  mail-service:
    image: dthieudocker/mail-quarkus-backend:3.0
    container_name: mail-service
    ports:
      - "8080:8080"

    environment:
      # ========================
      # DATABASE
      # ========================
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://my-postgres:5432/postgres
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: 12345

      # ========================
      # KAFKA (GIỮ NGUYÊN)
      # ========================
      KAFKA_BOOTSTRAP_SERVERS: kafka-local:9092

      # ========================
      # MAIL
      # ========================
      QUARKUS_MAILER_HOST: mailpit
      QUARKUS_MAILER_PORT: 1025

    depends_on:
      - kafka-local
      - my-postgres
      - mailpit

  # ========================
  # STREAMLIT UI
  # ========================
  mail-ui:
    image: dthieudocker/mail-ui:2.0
    container_name: mail-ui
    ports:
      - "8501:8501"

    environment:
      KAFKA_SERVER: kafka-local:9092
      WS_URL: ws://mail-service:8080/mail-status

    depends_on:
      - mail-service
      - kafka-local

# ========================
# VOLUMES
# ========================
volumes:
  postgres_data:
  kafka_data: